<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7 Sneaker Store</title>
    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
   <main>
    <section>
        <div class="payment-section">
            <div class="checkout">
                <div class="contact-details">
                    <p>Checkout</p>
                    <h6>Contact Details</h6>
                    <label for="email">Email ID</label>
                    <input type="email" id="email" placeholder="John Doe" required>
                </div>
                <div class="pay-details">
                    <h6>Payment</h6>
                    <div class="pay-info">
                        <div class="pay-option">
                            <div class="option"><i class="fa-solid fa-credit-card fa-sm"></i><p>Card</p></div>
                            <div class="option"><i class="fa-brands fa-btc fa-sm"></i><p>Crypto</p></div>
                            <div class="option"><i class="fa-solid fa-building-columns fa-sm"></i><p>Bank</p></div>
                            <div class="option"><i class="fa-solid fa-ellipsis-vertical fa-sm"></i></div>
                        </div>
                        <div class="card-details">
                            <div class="card-no">
                                <label for="card-number">Card Number</label>
                                <input type="number" id="card-number" placeholder="John Doe"required>
                            </div>
                            <div class="other-details">
                                <div class="input">
                                <label for="expiry">Expiry</label>
                                <input type="text" id="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="input">
                                <label for="cvv">CVV</label>
                                <input type="password" id="cvv" placeholder="..." required maxlength="3">
                                </div>
                                <div class="input">
                                <label for="country">Country</label>
                                <input type="text" id="country" placeholder="India" required>
                                </div>
                                <div class="input">
                                <label for="zip">ZIP</label>
                                <input type="text" id="zip" placeholder="xxxxx" required>
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
                
            </div>

            <div class="payment">
                         <h4>Order Summary</h4>     
                        <div class="coupon">
                            <h6>Enter Coupon Code </h6>
                            <input type="number" placeholder="COUPON CODE">
                            <button>Apply Coupon</button>

                            <table>
                                <tr>
                                    <td>Sub Total</td>
                                    <td>$4,700</td>
                                </tr>

                                <tr>                           
                                    <td>Taxes(if applicable)</td>
                                    <td>$199</td>
                                </tr> 

                                <tr>
                                    <td>Discount</td>
                                    <td>$0</td>
                                </tr>

                                <tfoot>
                                    <tr>
                                        <td>Total</td>
                                        <td>$4,999</td>
                                    </tr>
                                </tfoot>
                                
                            </table>
                        </div>

                        <div class="pay-now-btn">
                            <button> <a href="payment.html">Pay Now $4,999</a></button>
                            <div class="payment-icon">
                            <img src="image folder/Secure_pay.png" alt="Secure-pay">
                            <img src="image folder/Razorpay_.png" alt="Razorpay">
                            <img src="image folder/Secure_pay 2.png" alt="Secure-pay">       
                            </div>
                        </div>
            </div>


        </div>
    </section>
   </main>


</body>
</html>
